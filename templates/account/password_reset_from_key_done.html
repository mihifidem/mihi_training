{% extends 'base.html' %}
{% block title %}Contraseña restablecida — MihiTraining{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center py-5 bg-primary bg-opacity-10">
  <div class="card border-0 shadow-lg" style="width:100%;max-width:420px;">
    <div class="card-body p-5 text-center">

      <span class="d-inline-flex align-items-center justify-content-center bg-success bg-opacity-10 rounded-circle mb-3" style="width:72px;height:72px;">
        <i class="bi bi-check-circle fs-2 text-success"></i>
      </span>
      <h2 class="fw-bold mb-2">¡Contraseña actualizada!</h2>
      <p class="text-muted">
        Tu contraseña ha sido restablecida correctamente. Ya puedes iniciar sesión con tu nueva contraseña.
      </p>

      <div class="d-grid mt-4">
        <a href="{% url 'account_login' %}" class="btn btn-primary fw-semibold">
          <i class="bi bi-box-arrow-in-right me-1"></i>Iniciar sesión
        </a>
      </div>

    </div>
  </div>
</div>
{% endblock %}
