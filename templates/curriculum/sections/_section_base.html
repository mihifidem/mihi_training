{% extends "base.html" %}
{% block content %}
<div class="container py-4" style="max-width:750px;">
  <div class="d-flex align-items-center gap-3 mb-4">
    <a href="{% url 'curriculum:dashboard' %}" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-arrow-left"></i>
    </a>
    <h1 class="h4 mb-0 fw-bold">{% block section_title %}Sección{% endblock %}</h1>
  </div>

  {% if messages %}
  {% for msg in messages %}
  <div class="alert alert-{{ msg.tags|default:'info' }} alert-dismissible fade show" role="alert">
    {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  {% endfor %}
  {% endif %}

  <div class="card border-0 shadow-sm">
    <div class="card-body p-4">
      <form method="post" enctype="multipart/form-data" novalidate>
        {% csrf_token %}
        {% block form_content %}{% endblock %}
        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-lg me-1"></i>Guardar
          </button>
          <a href="{% url 'curriculum:dashboard' %}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
