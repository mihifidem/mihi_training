{% extends "base.html" %}
{% block title %}Eliminar perfil{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:500px;">
  <div class="card border-0 shadow-sm">
    <div class="card-body p-4 text-center">
      <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:3rem;"></i>
      <h4 class="mt-3 mb-1">¿Eliminar este perfil?</h4>
      <p class="text-muted mb-4">
        Vas a eliminar el perfil <strong>«{{ profile.nombre }}»</strong>
        (<code>opentowork.es/{{ profile.slug }}</code>).
        Esta acción no se puede deshacer.
      </p>
      <div class="d-flex gap-2 justify-content-center">
        <a href="{% url 'curriculum:profile_list' %}" class="btn btn-outline-secondary">Cancelar</a>
        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-1"></i>Eliminar</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
