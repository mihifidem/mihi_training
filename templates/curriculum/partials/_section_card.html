{% load static %}
<div class="col-sm-6 col-md-4 col-xl-3">
  <a href="{% url url %}" class="text-decoration-none">
    <div class="card border-0 shadow-sm section-card h-100">
      <div class="card-body d-flex align-items-center gap-3">
        <div class="rounded-3 d-flex align-items-center justify-content-center flex-shrink-0"
             style="width:48px;height:48px;background:{% if done %}#d1fae5{% else %}#eff6ff{% endif %}">
          <i class="bi {{ icon }} fs-5" style="color:{% if done %}#059669{% else %}#4f46e5{% endif %}"></i>
        </div>
        <div class="flex-fill">
          <div class="d-flex align-items-center gap-1">
            <span class="fw-semibold small">{{ title }}</span>
            {% if done %}
            <i class="bi bi-check-circle-fill text-success" style="font-size:.8rem;"></i>
            {% endif %}
          </div>
          <p class="text-muted mb-0" style="font-size:.75rem;">{{ desc }}</p>
        </div>
        <i class="bi bi-chevron-right text-muted small"></i>
      </div>
    </div>
  </a>
</div>
